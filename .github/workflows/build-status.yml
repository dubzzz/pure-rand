name: Build Status

on:
  push:
    branches:
      - main
      - next-*
      - fix-v*
    tags:
      - v**
  pull_request:
    branches:
      - main
      - next-*
      - fix-v*

jobs:
  # Job to prepare pnpm cache (pre-requisite for any job installing dependencies)
  warmup_pnpm_cache:
    name: 'Warm up pnpm cache'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        id: pnpm-cache
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Update pnpm cache
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  # Validation jobs
  no_dedupe_required:
    name: 'No dedupe required'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Ensure no dedupe required
        run: pnpm dedupe --check
  format:
    name: 'Format'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check format
        run: pnpm format:check
  typecheck:
    name: 'Typecheck'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm typecheck
  bench:
    name: 'Bench'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Bench tests
        id: bench
        run: pnpm bench | tee bench-output.txt
      - name: Upload bench results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bench-output
          path: bench-output.txt
          if-no-files-found: error
          retention-days: 1
  comment_bench:
    name: 'Comment bench results'
    needs: bench
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download bench results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bench-output
      - name: Comment bench results on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require("fs");
            const raw = fs.readFileSync("bench-output.txt", "utf8");
            const cleaned = raw.replace(/\x1B\[[0-9;]*[mK]/g, "");
            const commentHeader = "### :stopwatch: Benchmark Results";
            const body = `${commentHeader}\n\n<details><summary>Click to expand</summary>\n\n\`\`\`\n${cleaned}\n\`\`\`\n</details>\n\nCommit: ${context.payload.pull_request.head.sha} (merge: ${context.sha})`;
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.user.login === "github-actions[bot]" && c.body.startsWith(commentHeader));
            if (existing !== undefined) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
  package_size:
    name: 'Package size'
    needs: production_package
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      lastPublishedVersion: ${{ steps.compute.outputs.lastPublishedVersion }}
      tgzSize: ${{ steps.compute.outputs.tgzSize }}
      mainTgzSize: ${{ steps.compute.outputs.mainTgzSize }}
    steps:
      - name: Restore main bundle from cache
        id: main-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: package.tgz
          # Non-matching key so restore-keys picks the most recent main cache
          key: bundle-main-will-not-match
          restore-keys: bundle-main-
      - name: Rename main bundle
        if: steps.main-cache.outputs.cache-hit != ''
        run: mv package.tgz main-package.tgz
      - name: Download production package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bundle
      - name: Compute package size
        id: compute
        run: |
          extract_sizes() {
            local tgz_path="$1"
            local kind="$2"
            mkdir -p extracted && tar -xzf "$tgz_path" -C extracted
            local pkg_dir="extracted/package"
            find "$pkg_dir" -type f -exec stat --format='%s %n' {} \; | while read -r size f; do
              rel_path="${f#$pkg_dir/}"
              echo "$kind $size $rel_path"
            done
            rm -rf extracted
          }

          extract_sizes package.tgz current > size-output.txt
          echo "tgzSize=$(stat --format=%s package.tgz)" >> "$GITHUB_OUTPUT"

          if [ -f main-package.tgz ]; then
            extract_sizes main-package.tgz main >> size-output.txt
            echo "mainTgzSize=$(stat --format=%s main-package.tgz)" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No cached main bundle found, main comparison will be skipped"
          fi

          mkdir -p published
          if npm pack pure-rand --pack-destination=published 2>/dev/null; then
            published_tgz=$(find published -name '*.tgz' -type f | head -n1)
            extract_sizes "$published_tgz" published >> size-output.txt
            echo "lastPublishedVersion=$(basename "$published_tgz" .tgz | sed 's/^pure-rand-//')" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to download published version from npm, size comparison will be skipped"
          fi
          cat size-output.txt
      - name: Upload size results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: size-output
          path: size-output.txt
          if-no-files-found: error
          retention-days: 1
  comment_package_size:
    name: 'Comment package size'
    needs: package_size
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download size results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: size-output
      - name: Comment package size on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Extract details on files
            const fs = require("fs");
            const raw = fs.readFileSync("size-output.txt", "utf8").trim();
            const lines = raw.split("\n");
            const currentFiles = [];
            const mainFiles = [];
            const publishedFiles = [];
            for (const line of lines) {
              const m = line.match(/^(current|main|published)\s+(\d+)\s+(.+)$/);
              if (m === null) {
                continue;
              }
              const files = m[1] === "current" ? currentFiles : m[1] === "main" ? mainFiles : publishedFiles;
              files.push({ size: Number(m[2]), path: m[3] });
            }
            currentFiles.sort((a, b) => b.size - a.size);
            mainFiles.sort((a, b) => b.size - a.size);
            publishedFiles.sort((a, b) => b.size - a.size);

            // Define various helpers
            const isESM = f => f.path.startsWith("lib/esm/");
            const isCJS = f => f.path.startsWith("lib/") && !isESM(f);
            const isJS = f => f.path.endsWith(".js");
            const isDTS = f => f.path.endsWith(".d.ts");
            const sumSize = (files, predicate) => files.reduce((s, f) => predicate(f) ? s + f.size : s, 0);
            const formatBytes = b => b >= 1048576 ? (b / 1048576).toFixed(2) + " MB" : b >= 1024 ? (b / 1024).toFixed(2) + " kB" : b + " B";
            const formatDiff = (newSize, refSize) => { const d = newSize - refSize; if (d === 0) return "🟰"; if (refSize === 0) return "🔺 new"; const pct = ((d / refSize) * 100).toFixed(1); return d > 0 ? `🔺 +${pct}%` : `🔽 ${pct}%`; };
            const hasMain = mainFiles.length > 0;

            // Compute totals and categories
            const totalNew = sumSize(currentFiles, () => true);
            const totalMain = sumSize(mainFiles, () => true);
            const totalPublished = sumSize(publishedFiles, () => true);
            const esmJsFilter = f => isESM(f) && isJS(f);
            const esmDtsFilter = f => isESM(f) && isDTS(f);
            const cjsJsFilter = f => isCJS(f) && isJS(f);
            const cjsDtsFilter = f => isCJS(f) && isDTS(f);

            // Build category table
            const catRow = (label, filter, isBold) => {
              const n = sumSize(currentFiles, filter);
              const m = sumSize(mainFiles, filter);
              const p = sumSize(publishedFiles, filter);
              const fmt = v => isBold ? `**${formatBytes(v)}**` : formatBytes(v);
              let row = `| ${isBold ? "**" + label + "**" : label} | ${fmt(n)} |`;
              if (hasMain) row += ` ${fmt(m)} | ${formatDiff(n, m)} |`;
              row += ` ${fmt(p)} | ${formatDiff(n, p)} |\n`;
              return row;
            };
            let catHeader = "| Category | Size (new) |";
            let catSep = "|----------|------|";
            if (hasMain) {
              catHeader += " Size (main) | Diff (main) |";
              catSep += "------|------|";
            }
            catHeader += " Size (published) | Diff (published) |\n";
            catSep += "------|------|\n";
            let details = catHeader + catSep;
            details += catRow("Total", () => true, true);
            details += catRow("ESM bundle", esmJsFilter, false);
            details += catRow("CJS bundle", cjsJsFilter, false);
            details += catRow("Types for ESM", esmDtsFilter, false);
            details += catRow("Types for CJS", cjsDtsFilter, false);

            // Build merged per-file table
            const mainByPath = new Map(mainFiles.map(f => [f.path, f]));
            const publishedByPath = new Map(publishedFiles.map(f => [f.path, f]));
            const seenPaths = new Set();
            let fileHeader = "| File | Size (new) |";
            let fileSep = "|------|------|";
            if (hasMain) {
              fileHeader += " Size (main) | Diff (main) |";
              fileSep += "------|------|";
            }
            fileHeader += " Size (published) | Diff (published) |\n";
            fileSep += "------|------|\n";
            details += "\n" + fileHeader + fileSep;

            // New files first (sorted by descending size)
            for (const f of currentFiles) {
              seenPaths.add(f.path);
              const mn = mainByPath.get(f.path);
              const pub = publishedByPath.get(f.path);
              let row = `| \`${f.path}\` | ${formatBytes(f.size)} |`;
              if (hasMain) row += ` ${mn ? formatBytes(mn.size) : "-"} | ${mn ? formatDiff(f.size, mn.size) : "➕"} |`;
              row += ` ${pub ? formatBytes(pub.size) : "-"} | ${pub ? formatDiff(f.size, pub.size) : "➕"} |\n`;
              details += row;
            }
            // Main-only files (not in new)
            for (const f of mainFiles) {
              if (!seenPaths.has(f.path)) {
                seenPaths.add(f.path);
                const pub = publishedByPath.get(f.path);
                let row = `| \`${f.path}\` | - |`;
                if (hasMain) row += ` ${formatBytes(f.size)} | ➖ |`;
                row += ` ${pub ? formatBytes(pub.size) : "-"} | ${pub ? "➖" : ""} |\n`;
                details += row;
              }
            }
            // Published-only files (not in new or main)
            for (const f of publishedFiles) {
              if (!seenPaths.has(f.path)) {
                let row = `| \`${f.path}\` | - |`;
                if (hasMain) row += ` - | - |`;
                row += ` ${formatBytes(f.size)} | ➖ |\n`;
                details += row;
              }
            }

            // Build summary header: new size vs main vs published
            const tgzSize = Number("${{ needs.package_size.outputs.tgzSize }}");
            const mainTgzSize = Number("${{ needs.package_size.outputs.mainTgzSize }}") || 0;
            const lastPublishedVersion = "${{ needs.package_size.outputs.lastPublishedVersion }}";

            let summary = `**New size:** ${formatBytes(totalNew)} (tgz: ${formatBytes(tgzSize)})`;

            if (hasMain) {
              const mainDiff = totalNew - totalMain;
              const mainSign = mainDiff > 0 ? "+" : mainDiff < 0 ? "-" : "";
              const mainPct = totalMain > 0 ? (mainDiff / totalMain) * 100 : 0;
              const mainArrow = mainDiff > 0 ? " 🔺" : mainDiff < 0 ? " 🔽" : "";
              const mainPctStr = mainDiff !== 0 ? `${mainArrow} ${mainSign}${Math.abs(mainPct).toFixed(1)}%` : "";
              summary += ` — **Main:** ${formatBytes(totalMain)}`;
              if (mainTgzSize > 0) summary += ` (tgz: ${formatBytes(mainTgzSize)})`;
              summary += ` (${mainSign}${formatBytes(Math.abs(mainDiff))})${mainPctStr}`;
            }

            if (totalPublished > 0) {
              const pubDiff = totalNew - totalPublished;
              const pubSign = pubDiff > 0 ? "+" : pubDiff < 0 ? "-" : "";
              const pubPct = totalPublished > 0 ? (pubDiff / totalPublished) * 100 : 0;
              const pubArrow = pubDiff > 0 ? " 🔺" : pubDiff < 0 ? " 🔽" : "";
              const pubPctStr = pubDiff !== 0 ? `${pubArrow} ${pubSign}${Math.abs(pubPct).toFixed(1)}%` : "";
              summary += ` — **Published (${lastPublishedVersion}):** ${formatBytes(totalPublished)} (${pubSign}${formatBytes(Math.abs(pubDiff))})${pubPctStr}`;
            }

            const commentHeader = "### 🗜️ Package Size";
            const noMainWarning = hasMain ? "" : "\n\n**⚠️ No cached main bundle was available — main comparison is not included.**";
            const body = `${commentHeader}\n\n${summary}\n\n<details><summary>Click to expand</summary>\n\n${details}\n\n</details>\n\nCommit: ${context.payload.pull_request.head.sha} (merge: ${context.sha})${noMainWarning}`;
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.user.login === "github-actions[bot]" && c.body.startsWith(commentHeader));
            if (existing !== undefined) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
  test:
    name: 'Test'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x, latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v${{matrix.node-version}}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{matrix.node-version}}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test --coverage
      - name: Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de #v5.5.2
        with:
          name: unit-tests-${{matrix.node-version}}
          flags: unit-tests, unit-tests-${{matrix.node-version}}
          token: ${{secrets.CODECOV_TOKEN}}
          fail_ci_if_error: false # default: false
          verbose: false # default: false
  production_package:
    name: 'Build production package'
    needs: warmup_pnpm_cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production package
        run: pnpm build
        env:
          EXPECT_GITHUB_SHA: true
      - name: Create bundle
        run: pnpm pack --out package.tgz
      - name: Upload production package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bundle
          path: package.tgz
          if-no-files-found: error
          retention-days: 1
      - name: Prune old main bundle caches
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache list --key bundle-main- --json key -q '.[].key' | xargs -rn1 gh cache delete || true
      - name: Cache bundle for main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: package.tgz
          key: bundle-main-${{ github.sha }}
      - name: Preview (no comment)
        if: github.event_name != 'pull_request'
        run: pnpm dlx pkg-pr-new publish --compact --comment=off
      - name: Preview
        if: github.event_name == 'pull_request'
        run: pnpm dlx pkg-pr-new publish --compact

  # Post-build jobs
  test_bundle:
    name: 'Test bundle'
    needs:
      - warmup_pnpm_cache
      - production_package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download production packages
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bundle
      - name: Publint
        run: pnpm dlx publint ./package.tgz
      - name: Unpack production package
        run: tar -xzf package.tgz --strip-components=1
      - name: Alter internals to behave as if published
        run: mv .git node_modules/.git && pnpm exec packaged --keep-node-modules && mv node_modules/.git .git
      - name: Retrieve potentially dropped test-bundle
        run: git restore -s@ -SW -- test-bundle
      - name: Check bundle
        run: pnpm test-bundle
      - name: Check legacy bundle
        run: |
          export NODE_VERSION="$(node --version)"
          export NVS_HOME="$HOME/.nvs"
          git clone --branch v1.7.1 --depth 1 https://github.com/jasongin/nvs "$NVS_HOME"
          if [ "$(git -C "$NVS_HOME" rev-parse HEAD)" != "b87ae9593cd20e7b667e9099240c9befeb50659f" ]; then
            echo "ERROR: HEAD is not the expected commit hash"
            exit 1
          fi
          chmod +x "$NVS_HOME/nvs"
          export PATH="$PATH:$NVS_HOME"
          if [ "$(node --version)" != "$NODE_VERSION" ]; then
            echo "ERROR: Node version got updated from $NODE_VERSION to $(node --version)"
            exit 2
          fi
          pnpm test-legacy-bundle
          if [ "$(node --version)" != "$NODE_VERSION" ]; then
            echo "ERROR: Node version got updated from $NODE_VERSION to $(node --version)"
            exit 3
          fi

  # Job to confirm every required job passed
  pre_all_required_checks_passed:
    name: 'Pre All required checks passed'
    needs:
      - no_dedupe_required
      - format
      - typecheck
      - test
      - production_package
      - test_bundle
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "Success"
  all_required_checks_passed:
    name: 'All required checks passed'
    needs: pre_all_required_checks_passed
    if: always()
    runs-on: ubuntu-latest
    steps:
      - if: needs.pre_all_required_checks_passed.result == 'success'
        name: Success
        run: echo "Success"
      - if: needs.pre_all_required_checks_passed.result != 'success'
        name: Failure
        run: exit 1

  # Jobs for validated packages only
  publish_package:
    name: 'Publish package'
    needs: all_required_checks_passed
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Using Node v24.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Install latest npm version
        run: npm install -g npm
      - name: Download production package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bundle
      - uses: step-security/wait-for-secrets@084b3ae774c0e0003a9307ae4f487c10f1f998fe # v1.2.1
        id: wait-for-secrets
        with:
          secrets: |
            OTP:
              name: 'OTP to publish package'
              description: 'OTP from authenticator app'
      - name: Publish package
        run: npm publish --provenance --access public --otp "$OTP_VALUE" package.tgz
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
          OTP_VALUE: ${{steps.wait-for-secrets.outputs.OTP}}
