name: Claude Review

on:
  issue_comment:
    types: [created] # Runs your workflow when an issue or pull request comment is created
  pull_request_review: # Runs your workflow when a pull request review is submitted
    types: [submitted]

jobs:
  claude_review:
    if: |
      (github.actor == 'dubzzz') &&
      (
        (github.event_name == 'issue_comment' && github.event.comment.body == '/claude-review') ||
        (github.event_name == 'pull_request_review' && github.event.review.body == '/claude-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the repository code
      pull-requests: write # Required to write comments on pull requests
      id-token: write # Required for Claude, otherwise fails with "Could not fetch an OIDC token"
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Run Claude Code for Reviews
        id: claude
        uses: anthropics/claude-code-action@e7b588b6eaa5263c2e7c6c7b34a29e190d32ee68 # v1.0.81
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '/claude-review'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Always refer to relevant skills when doing reviews.
            Provide detailed feedback using inline comments for specific issues.

            **Tools Available:**
            Use the GitHub MCP tools to:
            1. Fetch PR diff
            2. Add inline comments to pending review
            3. Submit the review with appropriate status

            Begin your review now.
          allowed_tools: >-
            mcp__github__get_pull_request_diff,
            mcp__github__create_pending_pull_request_review,
            mcp__github__add_comment_to_pending_review,
            mcp__github__submit_pending_pull_request_review,
            mcp__github__get_pull_request,
            mcp__github__list_commits,
            Read,
            Glob
